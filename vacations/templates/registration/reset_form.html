{% extends 'vacations/base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 text-center">
                    <h4 class="mb-3">{{ title }}</h4>
                    <p class="text-muted small">{{ desc }}</p>

                    {% if validlink == False %}
                        <!-- Показываем ошибку, если ссылка устарела (шаг 3) -->
                        <div class="alert alert-danger">Ссылка недействительна. Запросите сброс заново.</div>
                        <a href="{% url 'password_reset' %}" class="btn btn-primary mt-2">Новый запрос</a>
                    {% else %}
                        <!-- Сама форма (шаг 1 или шаг 3) -->
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100 mt-2">{{ btn }}</button>
                        </form>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
